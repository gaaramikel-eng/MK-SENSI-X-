<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK SENSI X - A Melhor Sensibilidade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Cores baseadas na imagem (Roxo Hashira) */
            --primary-color: #a855f7; 
            --secondary-color: #6b21a8;
            --bg-dark: #050208;
            --card-bg: rgba(20, 10, 30, 0.8);
            --text-white: #ffffff;
            --accent-glow: rgba(168, 85, 247, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            /* Efeito de fundo estrelado e gradiente roxo */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(75, 0, 130, 0.2) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/stardust.png'); 
            color: var(--text-white);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Principal */
        .hero {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--card-bg);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Título Estilo Hashira */
        .logo-area h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 30%, var(--primary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .subtitle {
            font-size: 1rem;
            color: #d8b4fe;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Botão Roxo Pulsante */
        .cta-button {
            position: relative;
            padding: 20px 40px;
            font-size: 1.1rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            animation: pulse-purple 2s infinite;
        }

        @keyframes pulse-purple {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }

        .cta-button:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            letter-spacing: 1px;
        }

        /* Círculo de Brilho no fundo */
        .glow-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--secondary-color);
            filter: blur(120px);
            opacity: 0.3;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Detalhe de borda inferior (como na imagem 2) */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        }
    </style>
</head>
<body>

    <div class="glow-circle"></div>

    <section class="hero">
        <div class="logo-area">
            <h1>MK SENSI <span style="color: var(--text-white); -webkit-text-fill-color: white;">X</span></h1>
            <p class="subtitle">Domine o capa e tenha a sensi perfeita</p>
        </div>

        <a href="https://zyo.se/mk-configs" class="cta-button">
            <i class="fas fa-fire"></i>
            EU QUERO A SENSI 🔥
        </a>
    </section>

</body>
</html>
